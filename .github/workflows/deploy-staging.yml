name: Deploy Staging
on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: aws s3 sync dist/ s3://${{ secrets.STAGING_S3_BUCKET }} --delete
      - run: |
          aws s3 cp s3://${{ secrets.STAGING_S3_BUCKET }}/assets/ s3://${{ secrets.STAGING_S3_BUCKET }}/assets/ \
            --recursive --metadata-directive REPLACE \
            --cache-control "public, max-age=31536000, immutable"
      - run: |
          aws s3 cp s3://${{ secrets.STAGING_S3_BUCKET }}/index.html s3://${{ secrets.STAGING_S3_BUCKET }}/index.html \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=300"
      - run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.STAGING_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
